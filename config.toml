# The URL the site will be built for
base_url = "https://e-mindset.space"

# Whether to automatically compile all Sass files in the sass directory
compile_sass = true

# Whether to build a search index to be used later on by a JavaScript library
build_search_index = true

# The title of the site
title = "Mindset Footprint"

# The default author for pages
author = "Yuriy Polyulya"

generate_robots_txt = true
generate_sitemap = true
generate_feeds = true
feed_filenames = ["atom.xml", "rss.xml"]
taxonomies = [
  { name = "tags", feed = true },
  { name = "series", feed = true },
]

[markdown]
smart_punctuation = true

[markdown.highlighting]
theme = "github-light"

[extra]
math = true
date_format = "%d %B %Y"
google_analytics = "G-X0M5X84BLR"

[extra.nav]
links = [
  { url = "$BASE_URL/", icon = "coffee", name = "Blog" },
  { url = "https://github.com/immediatus/immediatus.github.io/discussions", icon = "message-square", name = "Discussions" },
  { url = "$BASE_URL/about", icon = "user", name = "About" },
]
